<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="DecorFlow — The intelligent operating system for event decorators, tent houses, and event management companies. Manage inventory, events, finances, and operations in one unified platform."
    />
    <meta name="theme-color" content="#B08D57" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1C1917" media="(prefers-color-scheme: dark)" />

    <!-- Open Graph -->
    <meta property="og:title" content="DecorFlow — Premium Event Management ERP" />
    <meta
      property="og:description"
      content="The intelligent operating system for event decorators and tent houses. Manage your entire business from a single platform."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/decorflow-logo.png" />

    <title>DecorFlow — Event Management ERP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root">
      <!-- Shown until React mounts / server health check completes (Render free-tier cold start). -->
      <div
        id="boot-splash"
        style="
          min-height: 100vh;
          margin: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          text-align: center;
          padding: 1.5rem;
          box-sizing: border-box;
          font-family: Inter, system-ui, sans-serif;
          background: #faf7f2;
          color: #231f1c;
          background-image:
            radial-gradient(ellipse at 30% 20%, rgba(176, 141, 87, 0.14), transparent 55%),
            radial-gradient(ellipse at 70% 80%, rgba(110, 42, 50, 0.08), transparent 50%);
        "
      >
        <img
          src="/logo-mark.png"
          alt="DecorFlow"
          width="48"
          height="48"
          style="display: block; margin-bottom: 1rem"
        />
        <div
          style="
            font-family: Fraunces, Georgia, serif;
            font-size: 1.75rem;
            letter-spacing: -0.02em;
            margin-bottom: 1.25rem;
          "
        >
          DecorFlow
        </div>
        <div
          style="
            width: 2rem;
            height: 2rem;
            border-radius: 9999px;
            border: 2px solid rgba(176, 141, 87, 0.3);
            border-top-color: #b08d57;
            animation: boot-spin 0.8s linear infinite;
            margin-bottom: 1.25rem;
          "
        ></div>
        <p style="margin: 0 0 0.5rem; font-size: 1rem; font-weight: 500">Waking up the server…</p>
        <p
          style="margin: 0; max-width: 22rem; font-size: 0.875rem; line-height: 1.5; color: #6b6560"
        >
          This can take up to a minute on the free hosting tier. The app is not broken — please wait
          while the demo server starts.
        </p>
        <style>
          @keyframes boot-spin {
            to {
              transform: rotate(360deg);
            }
          }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
