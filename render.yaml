services:
  - type: web
    name: decorflow
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: npm install && npm run build && npm run db:migrate && npm run db:seed
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HUSKY
        value: '0'
      - key: PORT
        value: '10000'
      - key: LOG_LEVEL
        value: info
      - key: VITE_API_URL
        value: ''
      - key: VITE_APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      # CORS_ORIGIN falls back to RENDER_EXTERNAL_URL at runtime
